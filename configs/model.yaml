target: TARGET
id_column: SK_ID_CURR
label: champion
model:
  type: lightgbm
  # NOTE: an Optuna study was run (see data/outputs/reports/tuning_results.csv).
  # Its best config did NOT beat these hand-tuned params on the held-out test set
  # (tuned 0.7732 vs baseline 0.7748), so the baseline is retained. Tuning output
  # is validated against held-out test, not blindly accepted.
  tuned: false
  params:
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 63
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    class_weight: balanced
    random_state: 42
split:
  test_size: 0.2
  random_state: 42
tuning:
  n_trials: 24
  timeout_seconds: 330
  cv_folds: 2
  early_stopping_rounds: 30
  max_estimators: 600
  random_state: 42
  sample_size: 70000
thresholds:
  start: 0.05
  stop: 0.95
  step: 0.05
business:
  profit_if_good: 0.2
  loss_given_default: 1.0
scenarios:
- name: Base
  threshold: 0.2
  profit_if_good: 0.2
  loss_given_default: 1.0
- name: Conservative
  threshold: 0.1
  profit_if_good: 0.2
  loss_given_default: 1.0
- name: Aggressive
  threshold: 0.3
  profit_if_good: 0.25
  loss_given_default: 1.0
